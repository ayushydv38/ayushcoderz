<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF Viewer</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0a0f;color:#fff;font-family:sans-serif;height:100vh;display:flex;flex-direction:column;}
        
        .header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#111118;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
        .header-title{font-size:14px;font-weight:600;color:#f5a623;}
        .actions{display:flex;gap:8px;}
        .btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s;}
        .btn:hover{background:rgba(255,255,255,0.15);border-color:#f5a623;}
        .btn-download{background:#f5a623;color:#000;border:none;}
        .btn-download:hover{background:#e8940a;}
        
        .viewer-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#0f1520;padding:20px;}
        .pdf-box{width:100%;max-width:900px;height:85vh;background:#fff;border-radius:8px;overflow:hidden;position:relative;box-shadow:0 4px 30px rgba(0,0,0,0.5);}
        .pdf-box iframe{width:100%;height:100%;border:none;background:#fff;}
        
        .loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#8888a8;z-index:10;}
        .loading .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#f5a623;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .footer{text-align:center;padding:6px;font-size:11px;color:#3d4a5c;border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0;}
        .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #f5a623;padding:8px 18px;border-radius:8px;font-size:12px;color:#fff;opacity:0;transition:opacity .3s;z-index:100;pointer-events:none;}
        .toast.show{opacity:1;}
        
        #pdfContainer{width:100%;height:100%;overflow:auto;padding:16px;background:#e8e8e8;}
        #pdfContainer canvas{display:block;margin:0 auto 12px;max-width:100%;box-shadow:0 2px 12px rgba(0,0,0,0.2);border-radius:4px;background:#fff;}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">📄 PDF Viewer</div>
        <div class="actions">
            <button class="btn" onclick="goBack()">← Back</button>
            <button class="btn btn-download" onclick="downloadPDF()">⬇ Download</button>
        </div>
    </div>
    
    <div class="viewer-wrap" id="viewerWrap">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Loading PDF...</div>
        </div>
        <div class="pdf-box" id="pdfBox">
            <div id="pdfContainer"></div>
        </div>
    </div>
    
    <div class="footer" id="pdfName">PDF Viewer</div>
    <div id="toast" class="toast">✅ Done!</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pdfUrl = urlParams.get('s') || urlParams.get('file') || '';
        
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');
        const pdfNameEl = document.getElementById('pdfName');
        const container = document.getElementById('pdfContainer');
        const pdfBox = document.getElementById('pdfBox');
        
        let pdfFileName = '';
        
        if (pdfUrl) {
            pdfFileName = pdfUrl.split('/').pop().split('?')[0] || 'document.pdf';
            pdfNameEl.textContent = '📄 ' + pdfFileName.slice(0, 25) + (pdfFileName.length > 25 ? '...' : '');
            
            // 🔥 METHOD 1: Microsoft Office Viewer (NO GOOGLE DOCS)
            tryMicrosoftViewer();
            
        } else {
            loading.innerHTML = '<div style="font-size:36px;margin-bottom:12px;">📄</div><p>No PDF URL</p>';
        }
        
        // 🔥 MICROSOFT OFFICE VIEWER
        function tryMicrosoftViewer() {
            const viewerUrl = 'https://view.officeapps.live.com/op/embed.aspx?src=' + encodeURIComponent(pdfUrl);
            
            // Check if iframe loads
            const iframe = document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.src = viewerUrl;
            
            iframe.onload = function() {
                loading.style.display = 'none';
            };
            
            container.innerHTML = '';
            container.appendChild(iframe);
            
            // 🔥 Fallback: agar Microsoft fail ho toh PDF.js use karo
            setTimeout(function() {
                // Check if iframe loaded (if content is empty, it failed)
                try {
                    // If we can access, it loaded
                } catch(e) {
                    // Fallback to PDF.js
                    loadPDFJS();
                }
            }, 5000);
            
            setTimeout(function() {
                loading.style.display = 'none';
            }, 5000);
        }
        
        // 🔥 PDF.js LOADER (NO GOOGLE DOCS)
        function loadPDFJS() {
            // Load PDF.js
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
            script.onload = function() {
                renderWithPDFJS();
            };
            document.head.appendChild(script);
        }
        
        function renderWithPDFJS() {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            
            container.innerHTML = '';
            loading.style.display = 'block';
            
            // Try proxy
            const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(pdfUrl);
            
            fetch(proxyUrl)
                .then(response => response.arrayBuffer())
                .then(data => pdfjsLib.getDocument({ data: data }).promise)
                .then(pdf => {
                    loading.style.display = 'none';
                    const totalPages = pdf.numPages;
                    
                    function renderPage(num) {
                        pdf.getPage(num).then(page => {
                            const viewport = page.getViewport({ scale: 1.2 });
                            const canvas = document.createElement('canvas');
                            const context = canvas.getContext('2d');
                            canvas.width = viewport.width;
                            canvas.height = viewport.height;
                            
                            page.render({ canvasContext: context, viewport: viewport }).promise.then(() => {
                                container.appendChild(canvas);
                                if (num < totalPages) renderPage(num + 1);
                            });
                        });
                    }
                    
                    renderPage(1);
                })
                .catch(() => {
                    // 🔥 FINAL FALLBACK: Direct PDF (browser default)
                    loading.innerHTML = '<div style="font-size:36px;margin-bottom:12px;">📄</div><p>Opening PDF directly...</p>';
                    setTimeout(() => {
                        loading.style.display = 'none';
                        container.innerHTML = `<iframe style="width:100%;height:100%;border:none;" src="${pdfUrl}"></iframe>`;
                    }, 1000);
                });
        }
        
        function goBack() {
            if (document.referrer) {
                window.location.href = document.referrer;
            } else {
                window.history.back();
            }
        }
        
        // 🔥 DOWNLOAD PDF
        function downloadPDF() {
            if (!pdfUrl) {
                showToast('❌ No PDF URL');
                return;
            }
            
            showToast('⏳ Downloading...');
            
            try {
                const link = document.createElement('a');
                link.href = pdfUrl;
                link.download = pdfFileName;
                link.target = '_blank';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast('✅ Download started!');
                return;
            } catch(e) {
                try {
                    window.open(pdfUrl, '_blank');
                    showToast('📄 Opening in new tab');
                } catch(e2) {
                    showToast('❌ Download failed');
                }
            }
        }
        
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') goBack();
            if (e.key === 'd' || e.key === 'D') downloadPDF();
        });
    </script>
</body>
</html>
