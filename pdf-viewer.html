<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AyushCoderZ | PDF Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0a0f;color:#fff;font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;}
        
        .header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#111118;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
        .logo{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:#f5a623;}
        .logo span{color:#fff;}
        .actions{display:flex;gap:10px;}
        .btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:6px;}
        .btn:hover{background:rgba(245,166,35,0.2);border-color:#f5a623;}
        .btn-download{background:#f5a623;color:#000;border:none;}
        .btn-download:hover{background:#e8940a;}
        
        .viewer-wrap{flex:1;overflow:auto;padding:16px;background:#0f1520;position:relative;}
        #pdfContainer{max-width:900px;margin:0 auto;}
        .page-wrap{margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.4);border-radius:4px;overflow:hidden;background:#fff;}
        .page-wrap canvas{display:block;width:100%;height:auto;}
        
        .loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#8888a8;}
        .loading .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#f5a623;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .footer{text-align:center;padding:8px;font-size:11px;color:#3d4a5c;border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0;}
        .footer a{color:#f5a623;text-decoration:none;}
        
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #f5a623;padding:10px 20px;border-radius:10px;font-size:13px;color:#fff;opacity:0;transition:opacity .3s;z-index:100;pointer-events:none;}
        .toast.show{opacity:1;}
        .toast.success{border-color:#10b981;}
        .toast.error{border-color:#ef4444;}
        
        .page-counter{text-align:center;padding:10px;color:#8888a8;font-size:13px;}
        .page-counter span{color:#f5a623;font-weight:700;}
        
        @media(max-width:480px){.btn span{display:none;}}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Ayush<span>CoderZ</span></div>
        <div class="actions">
            <button class="btn" onclick="goBack()">← <span>Back</span></button>
            <button class="btn btn-download" onclick="downloadPDF()">📥 <span>Download</span></button>
        </div>
    </div>
    
    <div class="viewer-wrap" id="viewerWrap">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Loading PDF...</div>
        </div>
        <div id="pdfContainer"></div>
    </div>
    
    <div class="footer">AyushCoderZ · <span id="pdfName">PDF Viewer</span></div>
    <div id="toast" class="toast">✅ Download started!</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pdfUrl = urlParams.get('s') || urlParams.get('file') || '';
        
        const container = document.getElementById('pdfContainer');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');
        const pdfNameEl = document.getElementById('pdfName');
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let pdfDoc = null;
        let totalPages = 0;
        let pdfFileName = '';
        
        if (pdfUrl) {
            pdfFileName = pdfUrl.split('/').pop().split('?')[0] || 'document.pdf';
            pdfNameEl.textContent = pdfFileName.slice(0, 30) + (pdfFileName.length > 30 ? '...' : '');
            loadPDF(pdfUrl);
        } else {
            loading.innerHTML = '<div style="font-size:40px;margin-bottom:16px;">📄</div><p>No PDF URL provided</p>';
        }
        
        async function loadPDF(url) {
            try {
                // Try direct fetch with credentials
                const response = await fetch(url, {
                    mode: 'cors',
                    credentials: 'include'
                });
                
                if (!response.ok) throw new Error('HTTP ' + response.status);
                
                const pdfData = await response.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
                totalPages = pdfDoc.numPages;
                
                loading.style.display = 'none';
                renderAllPages();
                
            } catch(e) {
                console.error('PDF Load Error:', e);
                // Try proxy as fallback
                try {
                    const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                    const response = await fetch(proxyUrl);
                    const pdfData = await response.arrayBuffer();
                    pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
                    totalPages = pdfDoc.numPages;
                    loading.style.display = 'none';
                    renderAllPages();
                } catch(e2) {
                    loading.innerHTML = '<div style="font-size:40px;margin-bottom:16px;">❌</div><p>Failed to load PDF. Try again.</p>';
                }
            }
        }
        
        function renderAllPages() {
            container.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                renderSinglePage(i);
            }
        }
        
        async function renderSinglePage(pageNum) {
            try {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1.5 });
                
                const wrapper = document.createElement('div');
                wrapper.className = 'page-wrap';
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                wrapper.appendChild(canvas);
                container.appendChild(wrapper);
                
            } catch(e) {
                console.error('Page render error:', e);
            }
        }
        
        function goBack() {
            if (document.referrer) {
                window.location.href = document.referrer;
            } else {
                window.history.back();
            }
        }
        
        // 🔥 FIXED: Download PDF with notification
        function downloadPDF() {
            if (!pdfUrl) {
                showToast('❌ No PDF URL found', 'error');
                return;
            }
            
            showToast('⏳ Downloading...', '');
            
            // Method 1: Try direct download with fetch
            fetch(pdfUrl)
                .then(response => {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.blob();
                })
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = pdfFileName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    setTimeout(() => URL.revokeObjectURL(url), 5000);
                    showToast('✅ Download started! Check notification bar', 'success');
                })
                .catch(() => {
                    // Method 2: Direct link open (fallback)
                    try {
                        const link = document.createElement('a');
                        link.href = pdfUrl;
                        link.download = pdfFileName;
                        link.target = '_blank';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        showToast('📄 Opening in new tab', '');
                    } catch(e) {
                        // Method 3: Open in new window
                        window.open(pdfUrl, '_blank');
                        showToast('📄 Opening in new window', '');
                    }
                });
        }
        
        function showToast(msg, type) {
            toast.textContent = msg;
            toast.className = 'toast';
            if (type === 'success') toast.classList.add('success');
            if (type === 'error') toast.classList.add('error');
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') goBack();
            if (e.key === 'd' || e.key === 'D') downloadPDF();
        });
        
        // 🔥 Android download notification support
        if (window.Android) {
            window.Android.showNotification = function(title, body) {
                // Android native notification
            };
        }
    </script>
</body>
</html>
