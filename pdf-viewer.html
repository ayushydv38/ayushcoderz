<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0a0f;color:#fff;font-family:sans-serif;height:100vh;display:flex;flex-direction:column;}
        
        .header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#111118;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
        .actions{display:flex;gap:8px;}
        .btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s;}
        .btn:hover{background:rgba(255,255,255,0.15);border-color:#f5a623;}
        .btn-download{background:#f5a623;color:#000;border:none;}
        .btn-download:hover{background:#e8940a;}
        
        .viewer-wrap{flex:1;overflow:auto;padding:12px;background:#0f1520;position:relative;}
        #pdfContainer{max-width:900px;margin:0 auto;}
        .page-wrap{margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,0.4);border-radius:4px;overflow:hidden;background:#fff;}
        .page-wrap canvas{display:block;width:100%;height:auto;}
        
        .loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#8888a8;}
        .loading .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#f5a623;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .footer{text-align:center;padding:6px;font-size:11px;color:#3d4a5c;border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0;}
        .page-counter{text-align:center;padding:8px;color:#8888a8;font-size:12px;}
        .page-counter span{color:#f5a623;font-weight:700;}
        
        .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #f5a623;padding:8px 18px;border-radius:8px;font-size:12px;color:#fff;opacity:0;transition:opacity .3s;z-index:100;pointer-events:none;}
        .toast.show{opacity:1;}
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size:14px;font-weight:600;">📄 PDF</div>
        <div class="actions">
            <button class="btn" onclick="goBack()">← Back</button>
            <button class="btn btn-download" onclick="downloadPDF()">⬇ Download</button>
        </div>
    </div>
    
    <div class="viewer-wrap" id="viewerWrap">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Loading PDF...</div>
        </div>
        <div id="pdfContainer"></div>
        <div class="page-counter" id="pageCounter"></div>
    </div>
    
    <div class="footer" id="pdfName">PDF Viewer</div>
    <div id="toast" class="toast">✅ Done!</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pdfUrl = urlParams.get('s') || urlParams.get('file') || '';
        
        const container = document.getElementById('pdfContainer');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');
        const pdfNameEl = document.getElementById('pdfName');
        const pageCounter = document.getElementById('pageCounter');
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let pdfDoc = null, totalPages = 0, pdfFileName = '';
        
        if (pdfUrl) {
            pdfFileName = pdfUrl.split('/').pop().split('?')[0] || 'document.pdf';
            pdfNameEl.textContent = '📄 ' + pdfFileName.slice(0, 25) + (pdfFileName.length > 25 ? '...' : '');
            loadPDF(pdfUrl);
        } else {
            loading.innerHTML = '<div style="font-size:36px;margin-bottom:12px;">📄</div><p>No PDF URL</p>';
        }
        
        async function loadPDF(url) {
            try {
                // Direct fetch
                let response = await fetch(url);
                let pdfData = await response.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
                totalPages = pdfDoc.numPages;
                loading.style.display = 'none';
                renderAllPages();
            } catch(e) {
                // Proxy fallback
                try {
                    const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                    let response = await fetch(proxyUrl);
                    let pdfData = await response.arrayBuffer();
                    pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
                    totalPages = pdfDoc.numPages;
                    loading.style.display = 'none';
                    renderAllPages();
                } catch(e2) {
                    loading.innerHTML = '<div style="font-size:36px;margin-bottom:12px;">❌</div><p>Failed to load PDF</p>';
                }
            }
        }
        
        function renderAllPages() {
            container.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) renderSinglePage(i);
            pageCounter.textContent = `📄 Page 1 of ${totalPages}`;
        }
        
        async function renderSinglePage(pageNum) {
            try {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1.5 });
                const wrapper = document.createElement('div');
                wrapper.className = 'page-wrap';
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                wrapper.appendChild(canvas);
                container.appendChild(wrapper);
            } catch(e) {}
        }
        
        function goBack() {
            document.referrer ? window.location.href = document.referrer : window.history.back();
        }
        
        function downloadPDF() {
            if (!pdfUrl) { showToast('❌ No URL'); return; }
            showToast('⏳ Downloading...');
            try {
                const link = document.createElement('a');
                link.href = pdfUrl;
                link.download = pdfFileName;
                link.target = '_blank';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast('✅ Download started!');
            } catch(e) {
                window.open(pdfUrl, '_blank');
                showToast('📄 Opening in new tab');
            }
        }
        
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') goBack();
            if (e.key === 'd' || e.key === 'D') downloadPDF();
        });
    </script>
</body>
</html>
