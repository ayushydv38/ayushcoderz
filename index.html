<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AyushCoderZ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--card:#13131c;--card2:#1c1c28;--accent:#f5a623;--purple:#7c5cbf;--purple2:#9b7de8;--text:#f0f0f5;--muted:#6b6b85;--muted2:#8888a8;--border:#2a2a3a;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.page{display:none;min-height:100vh;}.page.active{display:block;}
#pg-player{display:none;min-height:100vh;flex-direction:column;}#pg-player.active{display:flex;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.tl{display:flex;align-items:center;gap:6px;}
.logo{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;}.logo span{color:var(--accent);}
.ac-icon{width:33px;height:33px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#000;flex-shrink:0;}
.ac-icon.purple{background:var(--purple);}
.back-btn{display:flex;align-items:center;gap:4px;padding:6px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;white-space:nowrap;}
.back-btn:hover{background:var(--card2);}
.btag{padding:4px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted2);flex-shrink:0;}

/* HOME */
#pg-home{background:linear-gradient(135deg,rgba(124,92,191,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(245,166,35,.06) 0%,transparent 50%),var(--bg);}
.home-hero{padding:36px 22px 20px;}
.home-bc{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:5px;}.home-bc .dol{color:var(--accent);margin-right:5px;}
.home-cmd{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted2);margin-bottom:24px;}
.home-h{font-size:30px;font-weight:700;line-height:1.15;margin-bottom:9px;}.home-h .hl{color:var(--accent);}
.home-sub{font-size:13px;color:var(--muted2);line-height:1.6;margin-bottom:28px;}
.divider{height:1px;background:var(--border);margin:0 22px 24px;}
.plist{padding:0 14px 36px;display:flex;flex-direction:column;gap:11px;}
.pcard{display:flex;align-items:center;gap:14px;padding:17px 18px;background:var(--card);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;}
.pcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(245,166,35,.05),transparent);opacity:0;transition:opacity .22s;}
.pcard:hover{border-color:rgba(245,166,35,.4);transform:translateY(-1px);}.pcard:hover::before{opacity:1;}.pcard:active{transform:scale(.98);}
.picon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.pinfo{flex:1;}.pname{font-size:15px;font-weight:600;font-family:'Space Mono',monospace;}.pmeta{font-size:11px;color:var(--muted2);margin-top:2px;}
.parr{color:var(--muted);font-size:17px;transition:transform .2s;}.pcard:hover .parr{transform:translateX(3px);color:var(--accent);}

/* COMING SOON */
#pg-coming{background:radial-gradient(ellipse at 50% 30%,rgba(245,166,35,.07) 0%,transparent 60%),var(--bg);}
.cs-body{min-height:calc(100vh - 57px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;}
.cs-icon{font-size:62px;margin-bottom:20px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.cs-pname{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px;}
.cs-title{font-family:'Bebas Neue',sans-serif;font-size:54px;color:var(--accent);letter-spacing:2px;line-height:1;margin-bottom:10px;}
.cs-sub{font-size:14px;color:var(--muted2);line-height:1.6;max-width:250px;}
.cs-badge{margin-top:26px;padding:7px 20px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);border-radius:20px;font-size:11px;color:var(--accent);font-weight:600;letter-spacing:1px;font-family:'Space Mono',monospace;}

/* BATCHES */
#pg-batches{background:radial-gradient(ellipse at 50% 0%,rgba(245,166,35,.08) 0%,transparent 60%),var(--bg);}
.bhero{padding:28px 22px 20px;text-align:center;}
.lbadge{display:inline-flex;align-items:center;gap:6px;padding:5px 15px;background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1px;color:var(--accent);margin-bottom:16px;}
.ldot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.btitle{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:1;letter-spacing:1px;margin-bottom:5px;}.btitle .ac{color:var(--accent);}
.btagline{font-size:12px;color:var(--muted2);letter-spacing:.4px;margin-bottom:16px;}.btagline .or{color:var(--accent);font-weight:600;}
.srow{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;}
.sitem{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:.4px;}
.ddiv{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 0;}
.dd{width:7px;height:7px;background:var(--accent);transform:rotate(45deg);}.dl{flex:1;max-width:110px;height:1px;background:var(--border);}
.blist{padding:0 14px 36px;display:flex;flex-direction:column;gap:14px;}

/* BATCH CARD */
.bcard{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .22s;}
.bcard:hover{border-color:rgba(245,166,35,.4);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3);}.bcard:active{transform:scale(.99);}
.bthumb{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}

/* ── BATCH LOGO/IMAGE ── */
/* .bthumb ke andar ek <img class="bthumb-img"> hai.
   Jab src set hoga to woh puri thumbnail cover kar legi.
   Jab src empty hoga to gradient + Hindi text dikhega. */
.bthumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:3;display:none;}

.bthumb-grd{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(245,166,35,.25) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(124,92,191,.2) 0%,transparent 60%);}
.bthumb-name{position:absolute;font-family:'Bebas Neue',sans-serif;font-size:48px;color:rgba(255,255,255,.08);letter-spacing:3px;z-index:1;}
.bclass-badge{position:absolute;top:9px;left:9px;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;background:var(--accent);color:#000;z-index:4;}
.bprice-badge{position:absolute;top:9px;right:9px;text-align:right;z-index:4;}
.bprice-old{font-size:10px;color:var(--muted2);text-decoration:line-through;text-shadow:0 1px 3px rgba(0,0,0,.8);}
.bprice-new{font-size:19px;font-weight:700;color:var(--accent);font-family:'Space Mono',monospace;text-shadow:0 1px 4px rgba(0,0,0,.9);}
.bcard-body{padding:14px 16px;}
.bcard-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.7px;color:var(--accent);margin-bottom:9px;}
.tdot{width:4px;height:4px;background:var(--accent);border-radius:50%;}
.bcard-title{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:.4px;margin-bottom:9px;}
.bcard-meta{display:flex;gap:14px;margin-bottom:12px;}.mitem{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted2);}
.bcard-foot{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border);}
.sl{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--accent);}
.arr-btn{width:34px;height:34px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:15px;transition:all .2s;}
.bcard:hover .arr-btn{background:var(--accent);color:#000;}

/* CONTENT PAGE */
.chero{padding:20px 18px;background:var(--bg2);border-bottom:1px solid var(--border);}
.clabel{font-size:9px;letter-spacing:1.5px;color:var(--purple2);font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:4px;}.clabel .dot{width:5px;height:5px;background:var(--purple2);border-radius:50%;}
.ctitle{font-size:19px;font-weight:700;line-height:1.3;margin-bottom:14px;}
.cthumb{width:100%;border-radius:13px;aspect-ratio:16/9;background:linear-gradient(135deg,#0d0820,#1a0e35,#0a1228);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.cthumb-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(100,60,200,.4) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(245,166,35,.2) 0%,transparent 60%);}
.cthumb-text{position:relative;z-index:2;font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--accent);letter-spacing:2px;text-align:center;}
.cthumb-sub{font-family:'Bebas Neue',sans-serif;font-size:16px;color:rgba(255,255,255,.45);letter-spacing:4px;display:block;text-align:center;}
.cclass-badge{position:absolute;top:9px;left:9px;padding:3px 9px;background:var(--accent);color:#000;border-radius:5px;font-size:10px;font-weight:700;}
.cprice-badge{position:absolute;top:9px;right:9px;text-align:right;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:55px;z-index:100;}
.tab{flex:1;padding:12px;text-align:center;font-size:11px;font-weight:600;letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--purple2);border-bottom-color:var(--purple2);}

/* OVERVIEW */
.ov-sec{padding:18px;}
.tt-wrap{width:100%;border-radius:11px;overflow:hidden;margin-bottom:16px;}
.tt-head{background:linear-gradient(135deg,#8b0000,#cc2200);padding:10px 14px;text-align:center;}
.tt-bname{font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--accent);letter-spacing:2px;}.tt-type{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.7);}
.tt-ttl{text-align:center;padding:6px;background:rgba(0,0,0,.3);}.tt-ttl span{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#f0c040;letter-spacing:2px;}
.tt-tbl{width:100%;border-collapse:collapse;}
.tt-tbl th{background:rgba(245,166,35,.15);color:var(--accent);padding:6px 4px;font-size:9px;text-align:center;border:1px solid rgba(245,166,35,.2);}
.tt-tbl td{padding:6px 4px;text-align:center;font-size:9px;border:1px solid var(--border);color:var(--text);}
.tt-tbl tr:nth-child(even) td{background:rgba(255,255,255,.02);}.tt-hol{color:var(--accent)!important;font-weight:600;}
.wp-blk{background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:14px;}
.wp-hd{background:linear-gradient(135deg,#1a0a2e,#2a0a10);padding:11px 14px;}
.wp-cls{font-size:9px;letter-spacing:2px;color:var(--accent);font-weight:700;margin-bottom:2px;}.wp-ttl{font-family:'Bebas Neue',sans-serif;font-size:19px;color:#f0c040;letter-spacing:2px;}
.wp-tbl{width:100%;border-collapse:collapse;}
.wp-tbl th{background:rgba(245,166,35,.12);color:var(--accent);padding:6px 4px;font-size:8px;text-align:center;border:1px solid rgba(245,166,35,.15);font-weight:700;}
.wp-tbl td{padding:5px 3px;text-align:center;font-size:8px;border:1px solid var(--border);color:var(--muted2);}
.wp-tbl td:first-child{color:var(--text);font-weight:500;font-size:9px;}.wp-hol{color:var(--accent)!important;font-weight:700;}
.cdesc{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:14px;}
.cdesc-ttl{font-size:13px;font-weight:700;line-height:1.5;margin-bottom:9px;}.cdesc-ttl strong{color:var(--accent);}
.flist{list-style:none;display:flex;flex-direction:column;gap:8px;}
.fitem{display:flex;gap:9px;font-size:11px;line-height:1.5;color:var(--muted2);}
.fnum{width:17px;height:17px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--accent);font-weight:700;flex-shrink:0;margin-top:1px;}
.fitem strong{color:var(--text);}
.det-blk{background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:14px;}
.det-hd{padding:8px 14px;font-size:9px;letter-spacing:1.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);}
.det-row{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;}.det-row:last-child{border-bottom:none;}
.det-row .lbl{color:var(--muted2);}.det-row .val{font-weight:600;font-family:'Space Mono',monospace;font-size:11px;}
.vc-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:calc(100% - 36px);margin:0 18px 28px;padding:14px;background:var(--purple);border-radius:11px;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;border:none;color:var(--text);font-family:'DM Sans',sans-serif;transition:all .22s;}
.vc-btn:hover{background:var(--purple2);transform:translateY(-1px);}

/* CONTENT TAB */
.ch-sec{padding:18px 18px 10px;}.slabel{font-size:9px;letter-spacing:1.5px;color:var(--muted);font-weight:600;margin-bottom:11px;}
.ch-list{display:flex;flex-direction:column;gap:8px;}
.ch-item{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;}
.ch-item:hover{border-color:rgba(245,166,35,.4);}.ch-item:active{transform:scale(.98);}
.ch-l{display:flex;align-items:center;gap:11px;}
.ch-icon{width:36px;height:36px;background:rgba(245,166,35,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.ch-name{font-size:14px;font-weight:500;}.ch-arr{color:var(--muted);font-size:13px;transition:color .2s;}.ch-item:hover .ch-arr{color:var(--accent);}

/* SUBCHAPTER */
.sub-hd{padding:18px;background:var(--bg2);border-bottom:1px solid var(--border);}
.sub-subject{font-size:9px;letter-spacing:1.5px;color:var(--purple2);font-weight:600;margin-bottom:5px;}.sub-title{font-size:21px;font-weight:700;}
.sfl-list{padding:18px;display:flex;flex-direction:column;gap:11px;}
.sfl-card{display:flex;align-items:center;gap:13px;padding:15px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;}
.sfl-card:hover{border-color:rgba(245,166,35,.4);transform:translateX(3px);}.sfl-card:active{transform:scale(.98);}
.sfl-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.sfl-info{flex:1;}.sfl-name{font-size:15px;font-weight:600;margin-bottom:3px;}.sfl-meta{font-size:11px;color:var(--muted2);}
.sfl-arr{color:var(--muted);font-size:15px;transition:color .2s;}.sfl-card:hover .sfl-arr{color:var(--accent);}

/* LECTURE LIST */
.lec-hd{padding:18px;background:var(--bg2);border-bottom:1px solid var(--border);}
.lec-subject{font-size:9px;letter-spacing:1.5px;color:var(--purple2);font-weight:600;margin-bottom:3px;}
.lec-ttl{font-size:19px;font-weight:700;}.lec-cnt{font-size:11px;color:var(--muted2);margin-top:3px;font-family:'Space Mono',monospace;}
.lec-list{padding:14px;display:flex;flex-direction:column;gap:9px;}
.lec-item{display:flex;align-items:center;gap:11px;padding:13px;background:var(--card);border:1px solid var(--border);border-radius:11px;cursor:pointer;transition:all .2s;}
.lec-item:hover{border-color:rgba(124,92,191,.5);}.lec-item:active{transform:scale(.98);}
.lec-thumb{width:68px;height:44px;border-radius:7px;position:relative;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.lec-thumb-bg{position:absolute;inset:0;}
.lec-play{position:absolute;width:24px;height:24px;background:rgba(124,92,191,.92);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;padding-left:2px;}
.lec-info{flex:1;min-width:0;}
.lec-name{font-size:12px;font-weight:500;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lec-badge{display:inline-block;padding:2px 7px;background:rgba(124,92,191,.15);border:1px solid rgba(124,92,191,.3);border-radius:4px;font-size:8px;font-weight:700;letter-spacing:.7px;color:var(--purple2);}
.lec-dur{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;flex-shrink:0;}

/* PDF LIST */
.pdf-list{padding:14px;display:flex;flex-direction:column;gap:9px;}
.pdf-item{display:flex;align-items:center;gap:11px;padding:13px;background:var(--card);border:1px solid var(--border);border-radius:11px;cursor:pointer;transition:all .2s;}
.pdf-item:hover{border-color:rgba(245,70,70,.4);}.pdf-item:active{transform:scale(.98);}
.pdf-icon{width:42px;height:42px;background:rgba(245,70,70,.1);border:1px solid rgba(245,70,70,.25);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.pdf-info{flex:1;min-width:0;}
.pdf-name{font-size:12px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pdf-meta{font-size:10px;color:var(--muted2);}
.pdf-badge{display:inline-block;padding:2px 7px;background:rgba(245,70,70,.12);border:1px solid rgba(245,70,70,.3);border-radius:4px;font-size:8px;font-weight:700;letter-spacing:.7px;color:#f55;}

/* PLAYER */
.player-top{display:flex;align-items:center;gap:9px;padding:11px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
/* The YouTube iframe sits here — takes 16:9 of screen width */
.v-yt-wrap{width:100%;aspect-ratio:16/9;background:#000;flex-shrink:0;display:none;}
.v-yt-wrap.active{display:block;}
.v-yt-wrap iframe{width:100%;height:100%;border:none;display:block;}
/* Poster (when no URL) */
.vwrap{width:100%;aspect-ratio:16/9;background:#000;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.vbg{position:absolute;inset:0;background:linear-gradient(135deg,#0a0520 0%,#1a0f35 40%,#0e1a25 70%,#0a1a0e 100%);}
.vglow{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(245,166,35,.18) 0%,transparent 55%),radial-gradient(ellipse at 70% 30%,rgba(124,92,191,.14) 0%,transparent 50%);}
.vcenter{position:relative;z-index:2;background:rgba(0,0,0,.58);border:1px solid rgba(245,166,35,.25);border-radius:13px;padding:16px 22px;text-align:center;max-width:260px;backdrop-filter:blur(4px);}
.vs-tag{font-size:8px;letter-spacing:2px;color:var(--accent);font-weight:700;margin-bottom:5px;}
.vbatch{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);letter-spacing:2px;margin-bottom:2px;}
.vlname{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.vlnum{font-size:10px;color:var(--muted2);font-family:'Space Mono',monospace;}
.vplay-ov{position:absolute;z-index:3;width:60px;height:60px;background:rgba(124,92,191,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;padding-left:4px;box-
